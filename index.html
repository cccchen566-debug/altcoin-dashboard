<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>山寨幣即時分析</title>
<style>
:root {
--bg: #0a0a0f;
--surface: #12121a;
--surface2: #1a1a26;
--border: rgba(255,255,255,0.08);
--text: #e8e8f0;
--muted: #6b6b8a;
--accent: #7c6af0;
--green: #2dce89;
--red: #f44336;
--amber: #ffb74d;
--blue: #42a5f5;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
background: var(--bg);
color: var(--text);
font-family: 'SF Mono', 'Fira Code', monospace;
min-height: 100vh;
padding: 2rem 1rem;
}
.container { max-width: 760px; margin: 0 auto; }
header { margin-bottom: 2rem; }
h1 {
font-size: 13px;
letter-spacing: 0.15em;
color: var(--muted);
text-transform: uppercase;
margin-bottom: 0.25rem;
}
.tagline {
font-size: 22px;
color: var(--text);
letter-spacing: -0.02em;
font-family: system-ui, sans-serif;
font-weight: 300;
}
.tagline span { color: var(--accent); font-weight: 500; }
.search-row { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
input[type="text"] {
flex: 1;
background: var(--surface);
border: 1px solid var(--border);
border-radius: 8px;
padding: 0.75rem 1rem;
color: var(--text);
font-family: inherit;
font-size: 15px;
outline: none;
text-transform: uppercase;
}
input[type="text"]::placeholder { color: var(--muted); text-transform: none; }
input[type="text"]:focus { border-color: var(--accent); }
button {
background: var(--accent); border: none; border-radius: 8px;
padding: 0.75rem 1.5rem; color: #fff; font-family: inherit;
font-size: 14px; font-weight: 500; cursor: pointer;
letter-spacing: 0.05em; transition: opacity 0.2s; white-space: nowrap;
}
button:hover { opacity: 0.85; }
button:disabled { opacity: 0.4; cursor: not-allowed; }
.quick-btns { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 2rem; }
.quick-btn {
background: var(--surface); border: 1px solid var(--border);
border-radius: 6px; padding: 0.3rem 0.7rem; color: var(--muted);
font-family: inherit; font-size: 12px; cursor: pointer;
transition: all 0.15s; letter-spacing: 0.05em;
}
.quick-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--surface2); }
.card {
background: var(--surface); border: 1px solid var(--border);
border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem;
}
.card-header {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 1rem; padding-bottom: 0.75rem;
border-bottom: 1px solid var(--border);
}
.coin-name { font-size: 20px; font-family: system-ui, sans-serif; font-weight: 600; letter-spacing: -0.01em; }
.price-area { text-align: right; }
.price { font-size: 18px; font-weight: 500; }
.chg { font-size: 13px; margin-top: 2px; }
.pos { color: var(--green); }
.neg { color: var(--red); }
.neutral { color: var(--muted); }
.amber { color: var(--amber); }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
.metric { background: var(--surface2); border-radius: 8px; padding: 0.75rem; }
.metric-label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.35rem; }
.metric-val { font-size: 15px; font-weight: 500; }
.metric-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.section-title {
font-size: 11px; color: var(--muted); letter-spacing: 0.1em;
text-transform: uppercase; margin: 1rem 0 0.5rem;
display: flex; justify-content: space-between; align-items: baseline;
}
.section-title-note { color: var(--muted); font-size: 10px; letter-spacing: 0.05em; }
.taker-bar { height: 6px; border-radius: 3px; background: var(--surface2); margin-top: 0.4rem; overflow: hidden; position: relative; }
.taker-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.fr-timeline { display: flex; gap: 0.4rem; align-items: center; margin-top: 0.4rem; flex-wrap: wrap; }
.fr-pill { padding: 2px 8px; border-radius: 4px; font-size: 11px; background: var(--surface2); border: 1px solid var(--border); }
.fr-arrow { color: var(--muted); font-size: 12px; }

/* v2.2.0: 訊號品質評分 */
.quality-box {
background: linear-gradient(135deg, var(--surface2) 0%, rgba(124,106,240,0.05) 100%);
border-radius: 10px; padding: 1rem 1.25rem; margin: 0.5rem 0;
border-left: 3px solid var(--accent);
}
.quality-header {
display: flex; align-items: center; gap: 1.25rem; margin-bottom: 0.85rem;
font-family: system-ui, sans-serif;
}
.quality-score-large {
font-size: 38px; font-weight: 600;
font-family: 'SF Mono', monospace; line-height: 1;
}
.quality-score-large .denom { font-size: 14px; color: var(--muted); font-weight: 400; margin-left: 4px; }
.quality-label { font-size: 16px; font-weight: 500; }
.quality-direction { font-size: 12px; color: var(--muted); margin-top: 4px; }
.quality-stop {
font-size: 12px; color: var(--amber);
margin-bottom: 0.75rem; padding: 6px 10px;
background: rgba(255,183,77,0.08); border-radius: 6px;
font-family: system-ui, sans-serif;
border: 1px solid rgba(255,183,77,0.15);
}
.quality-stop-note { color: var(--muted); font-size: 11px; }
.quality-detail-list { display: flex; flex-direction: column; gap: 6px; }
.quality-detail {
display: grid;
grid-template-columns: 22px 130px 1fr;
align-items: center; gap: 0.5rem;
padding: 6px 10px; background: rgba(255,255,255,0.02);
border-radius: 6px; font-size: 12px;
}
.quality-detail-emoji { font-size: 14px; }
.quality-detail-name { font-weight: 500; font-family: system-ui, sans-serif; }
.quality-detail-stats { color: var(--muted); font-size: 11px; }
.quality-detail-stats strong { font-weight: 500; }
.quality-no-data {
padding: 0.75rem; color: var(--muted); font-size: 12px;
text-align: center; font-family: system-ui, sans-serif;
}

.verdict {
background: var(--surface2); border-radius: 10px;
padding: 1rem 1.25rem; margin-top: 0.5rem;
border-left: 3px solid var(--accent);
}
.verdict-label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.4rem; }
.verdict-text { font-size: 14px; line-height: 1.6; font-family: system-ui, sans-serif; }
.loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 13px; letter-spacing: 0.05em; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 0.75rem; }
@keyframes spin { to { transform: rotate(360deg); } }
.error { text-align: center; padding: 2rem; color: var(--red); font-size: 13px; }
.warn-banner {
background: rgba(255,183,77,0.08); border: 1px solid rgba(255,183,77,0.25);
border-radius: 8px; padding: 0.5rem 0.75rem; margin-bottom: 0.75rem;
font-size: 12px; color: var(--amber); font-family: system-ui, sans-serif;
}
footer {
margin-top: 2rem; text-align: center;
font-size: 11px; color: var(--muted); letter-spacing: 0.05em;
}
.timestamp { color: var(--accent); }
.version { color: var(--muted); opacity: 0.6; }
</style>
</head>
<body>
<div class="container">
<header>
<h1>Altcoin Monitor</h1>
<div class="tagline">即時分析 <span>任意幣安合約</span></div>
</header>

<div class="search-row">
<input type="text" id="symInput" placeholder="輸入幣種，例如 PEPE" />
<button id="analyzeBtn" onclick="analyze()">分析</button>
</div>

<div class="quick-btns" id="quickBtns"></div>

<div id="result"></div>

<footer>
資料來源：Binance Futures API &nbsp;·&nbsp; 每次查詢即時抓取
&nbsp;·&nbsp; <a href="indicator-guide.html" style="color:var(--accent);text-decoration:none;">📖 指標手冊</a>
&nbsp;·&nbsp; <a href="#" onclick="testConn();return false;" style="color:var(--accent);text-decoration:none;">連線測試</a>
&nbsp;·&nbsp; <span class="version" id="versionTag">v2.2.0</span>
</footer>
</div>

<script>
// ═════════════════════════════════════════════════════════════════════════
// v2.2.0：載入回測歷史資料，提供訊號品質評分
// ═════════════════════════════════════════════════════════════════════════
let HISTORICAL_STATS = null;

fetch('historical_stats.json')
  .then(r => r.ok ? r.json() : null)
  .then(d => {
    if (d) {
      HISTORICAL_STATS = d;
      document.getElementById('versionTag').textContent =
        `v2.2.0 · 回測 ${d.n_bull}多/${d.n_bear}空 · ${d.version}`;
      console.log('歷史回測資料載入：', d.version, '多頭', d.n_bull, '空頭', d.n_bear);
    }
  })
  .catch(e => console.warn('historical_stats.json 未載入，將跳過評分區塊：', e.message));

// ═════════════════════════════════════════════════════════════════════════
// 快捷按鈕
// ═════════════════════════════════════════════════════════════════════════
const QUICK = ['PEPE','WIF','BONK','DOGS','NOT','HMSTR','MEME','1000CAT','SHIB','FLOKI','TON'];
const qb = document.getElementById('quickBtns');
QUICK.forEach(s => {
  const b = document.createElement('button');
  b.className = 'quick-btn';
  b.textContent = s;
  b.onclick = () => { document.getElementById('symInput').value = s; analyze(); };
  qb.appendChild(b);
});
document.getElementById('symInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') analyze();
});

// ═════════════════════════════════════════════════════════════════════════
// 工具函式
// ═════════════════════════════════════════════════════════════════════════
function fmt(n, dec=2) {
  if (n === null || n === undefined || isNaN(n)) return 'N/A';
  return Number(n).toFixed(dec);
}
function fmtPrice(p) {
  if (!p) return 'N/A';
  return p < 0.0001 ? p.toFixed(8) : p < 0.01 ? p.toFixed(6) : p < 1 ? p.toFixed(4) : p.toFixed(2);
}
async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}
function safeFetch(url, label) {
  return fetchJSON(url).catch(e => {
    console.error(`[${label}]`, e.message);
    return null;
  });
}
function lastValid(arr) {
  if (!arr || !arr.length) return null;
  for (let i = arr.length - 1; i >= 0; i--) {
    if (arr[i] !== null && arr[i] !== undefined && !isNaN(arr[i])) return arr[i];
  }
  return null;
}

// ═════════════════════════════════════════════════════════════════════════
// ADX 計算
// ═════════════════════════════════════════════════════════════════════════
function calcADX(klines, period=14) {
  if (klines.length < period*2) return 0;
  const highs = klines.map(k=>parseFloat(k[2]));
  const lows  = klines.map(k=>parseFloat(k[3]));
  const closes= klines.map(k=>parseFloat(k[4]));
  const tr=[], pdm=[], ndm=[];
  for (let i=1; i<closes.length; i++) {
    tr.push(Math.max(highs[i]-lows[i], Math.abs(highs[i]-closes[i-1]), Math.abs(lows[i]-closes[i-1])));
    const up=highs[i]-highs[i-1], dn=lows[i-1]-lows[i];
    pdm.push(up>dn&&up>0?up:0);
    ndm.push(dn>up&&dn>0?dn:0);
  }
  function ws(arr,n){ let s=[arr.slice(0,n).reduce((a,b)=>a+b,0)]; for(let i=n;i<arr.length;i++) s.push(s[s.length-1]-s[s.length-1]/n+arr[i]); return s; }
  const atr=ws(tr,period), ps=ws(pdm,period), ns=ws(ndm,period);
  const dx=[];
  for (let i=0;i<atr.length;i++) {
    if (!atr[i]) continue;
    const pdi=100*ps[i]/atr[i], ndi=100*ns[i]/atr[i];
    dx.push(100*Math.abs(pdi-ndi)/((pdi+ndi)||1));
  }
  if (dx.length<period) return 0;
  let adx=dx.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for (let i=period;i<dx.length;i++) adx=(adx*(period-1)+dx[i])/period;
  return Math.round(adx*10)/10;
}

// ═════════════════════════════════════════════════════════════════════════
// v2.2.0：訊號方向分類（跟 backtest_analysis.py classify_signal 完全一致）
// ═════════════════════════════════════════════════════════════════════════
function classifyDirection({oiChg, ls, fr, tkFutLast, tkSpotLast, priceChg}) {
  let bull = 0, bear = 0;
  const reasons_bull = [], reasons_bear = [];

  // OI × 價格四象限
  if (oiChg !== null && priceChg !== null) {
    if (oiChg > 15 && priceChg > 0)       { bull += 2; reasons_bull.push("OI↑+漲"); }
    else if (oiChg > 15 && priceChg < 0)  { bear += 2; reasons_bear.push("OI↑+跌"); }
    else if (oiChg < -15 && priceChg > 0) { bull += 1; reasons_bull.push("OI↓+漲(軋空)"); }
    else if (oiChg < -15 && priceChg < 0) { bull += 1; reasons_bull.push("OI↓+跌(止損底部)"); }
    else if (oiChg > 0 && oiChg <= 15 && priceChg > 0) { bull += 1; reasons_bull.push("OI溫和↑+漲"); }
    else if (oiChg > 0 && oiChg <= 15 && priceChg < 0) { bear += 1; reasons_bear.push("OI溫和↑+跌"); }
  }

  // 多空比
  if (ls !== null) {
    if (ls < 0.5) {
      const s = (oiChg !== null && oiChg > 10) ? 2 : 1;
      bull += s; reasons_bull.push(`LS=${ls.toFixed(2)}極端偏空`);
    } else if (ls < 0.7) {
      const s = (oiChg !== null && oiChg > 10) ? 2 : 1;
      bull += s; reasons_bull.push(`LS=${ls.toFixed(2)}大量偏空`);
    } else if (ls < 1.0) {
      bull += 1; reasons_bull.push(`LS=${ls.toFixed(2)}偏空`);
    } else if (ls > 2.0) {
      const s = (oiChg !== null && oiChg > 10) ? 2 : 1;
      bear += s; reasons_bear.push(`LS=${ls.toFixed(2)}散戶頂部追多`);
    } else if (ls > 1.5) {
      bear += 1; reasons_bear.push(`LS=${ls.toFixed(2)}偏多謹慎`);
    }
  }

  // 資金費率
  if (fr !== null) {
    if (fr < -0.5)        { bull += 2; reasons_bull.push("FR極端負費率"); }
    else if (fr < -0.05)  { bull += 2; reasons_bull.push("FR高負費率"); }
    else if (fr < -0.005) { bull += 1; reasons_bull.push("FR輕微負費率"); }
    else if (fr > 0.05)   { bear += 1; reasons_bear.push("FR過熱"); }
  }

  // Taker（轉成 0-100）
  const tf = tkFutLast !== null ? tkFutLast * 100 : null;
  const ts = tkSpotLast !== null ? tkSpotLast * 100 : null;
  if (tf !== null) {
    if (tf > 60)      { bull += 1; reasons_bull.push("合Taker買盤"); }
    else if (tf < 40) { bear += 1; reasons_bear.push("合Taker賣壓"); }
  }
  if (ts !== null) {
    if (ts > 60)      { bull += 1; reasons_bull.push("現Taker買盤"); }
    else if (ts < 40) { bear += 1; reasons_bear.push("現Taker賣壓"); }
  }

  const net = bull - bear;
  const direction = net > 0 ? "多頭" : (net < 0 ? "空頭" : "中性");
  const confidence = Math.abs(net) >= 4 ? "高" : Math.abs(net) >= 2 ? "中" : "低";
  return { direction, bull, bear, net, confidence, reasons_bull, reasons_bear };
}

// ═════════════════════════════════════════════════════════════════════════
// v2.2.0：歷史回測查詢
// ═════════════════════════════════════════════════════════════════════════
function findBucket(value, bucketArray) {
  if (!bucketArray || value === null || value === undefined || isNaN(value)) return null;
  for (const b of bucketArray) {
    const lo = b.lo === null ? -Infinity : b.lo;
    const hi = b.hi === null ? Infinity  : b.hi;
    if (value >= lo && value < hi) return b;
  }
  return null;
}

function bucketContribution(bucket) {
  // 樣本太少不計分（n < 3 太小，不可信）
  if (!bucket || bucket.n < 3) return null;
  if (bucket.median === null || bucket.mae_med === null) return null;

  const median = bucket.median;
  const mae    = Math.abs(bucket.mae_med);
  const hit10  = bucket.hit_10 || 0;

  // 風險報酬比，裁掉極端值
  const rr           = mae > 0 ? median / mae : 0;
  const rr_clamped   = Math.max(0, Math.min(rr, 3));
  const rr_normalized = rr_clamped / 3;

  // 樣本權重（n=15 達滿分）
  const sw = Math.min(bucket.n / 15, 1.0);

  // 加權合成：命中率 50% + 報酬風險比 50%
  return (hit10 * 0.5 + rr_normalized * 0.5) * sw;
}

const INDICATOR_DISPLAY = {
  vol_ratio:  "成交量",
  oi_chg:     "OI 變化",
  ls_ratio:   "多空比",
  fr:         "資金費率",
  taker_fut:  "合約 Taker",
  taker_spot: "現貨 Taker",
};

function computeSignalQuality(metrics, direction) {
  if (!HISTORICAL_STATS) return { available: false };
  if (direction === "中性") return { available: false, reason: "neutral" };

  const stats = HISTORICAL_STATS[direction === "多頭" ? "bull" : "bear"];
  const sample_size = direction === "多頭" ? HISTORICAL_STATS.n_bull : HISTORICAL_STATS.n_bear;

  const values = {
    vol_ratio:  metrics.volRatio,
    oi_chg:     metrics.oiChg,
    ls_ratio:   metrics.ls,
    fr:         metrics.frNow,
    taker_fut:  metrics.tkFutLast !== null ? metrics.tkFutLast * 100 : null,
    taker_spot: metrics.tkSpotLast !== null ? metrics.tkSpotLast * 100 : null,
  };

  const contributions = [];
  const details = [];

  for (const [ind, val] of Object.entries(values)) {
    if (val === null) continue;
    const bucket = findBucket(val, stats[ind] || []);
    if (!bucket) continue;
    const c = bucketContribution(bucket);
    if (c === null) {
      // 樣本太少也列出，但不算入分數
      details.push({ indicator: ind, value: val, bucket, contribution: null, low_n: true });
      continue;
    }
    contributions.push(c);
    details.push({ indicator: ind, value: val, bucket, contribution: c, low_n: false });
  }

  // 按貢獻排序（null 放最後）
  details.sort((a, b) => {
    if (a.contribution === null) return 1;
    if (b.contribution === null) return -1;
    return b.contribution - a.contribution;
  });

  if (contributions.length === 0) {
    return {
      available: true, score: null, details, sample_size,
      reason: "no_data", direction
    };
  }

  const avg = contributions.reduce((a, b) => a + b, 0) / contributions.length;
  const score = Math.round(avg * 10 * 10) / 10;

  return { available: true, score, details, sample_size, direction };
}

function computeSuggestedStop(quality, direction) {
  if (!quality || !quality.details || !quality.details.length) return null;
  const maes = quality.details
    .filter(d => !d.low_n && d.bucket.mae_med !== null && d.bucket.mae_med !== undefined)
    .map(d => d.bucket.mae_med);
  if (!maes.length) return null;
  // 取最保守（最遠離 0）的 MAE，加 30% 緩衝
  const worst = direction === "多頭" ? Math.min(...maes) : Math.max(...maes);
  return worst * 1.3;
}

// ═════════════════════════════════════════════════════════════════════════
// v2.2.0：渲染訊號品質區塊
// ═════════════════════════════════════════════════════════════════════════
function renderQualityScore(quality, direction) {
  if (!quality.available) {
    if (quality.reason === "neutral") {
      return `<div class="quality-no-data">⚪ 訊號中性 — 多空得分相同，無明確方向，跳過評分</div>`;
    }
    return ""; // historical_stats.json 未載入，整段不顯示
  }

  if (quality.score === null) {
    return `<div class="quality-no-data">⚠️ 沒有匹配的歷史回測資料（所有指標桶 n < 3）</div>`;
  }

  const score = quality.score;
  const color = score >= 7 ? "var(--green)" : score >= 4.5 ? "var(--amber)" : "var(--red)";
  const label = score >= 8 ? "極強訊號" : score >= 6.5 ? "強訊號" :
                score >= 4.5 ? "中等訊號" : score >= 2.5 ? "弱訊號" : "極弱訊號";
  const dirEmoji = direction === "多頭" ? "⬆️ 做多" : "⬇️ 做空";

  const stopPct = computeSuggestedStop(quality, direction);
  const stopText = stopPct === null ? "" : `
    <div class="quality-stop">
      📉 建議止損：入場 ${stopPct > 0 ? "+" : ""}${stopPct.toFixed(1)}%
      <span class="quality-stop-note">　基於 MAE 中位 × 1.3 緩衝</span>
    </div>
  `;

  const detailHtml = quality.details.map(d => renderQualityDetail(d, direction)).join("");

  return `
    <div class="quality-box">
      <div class="quality-header">
        <div class="quality-score-large" style="color:${color}">
          ${score.toFixed(1)}<span class="denom">/ 10</span>
        </div>
        <div>
          <div class="quality-label" style="color:${color}">${label}</div>
          <div class="quality-direction">建議方向：<strong>${dirEmoji}</strong> · 基於 ${quality.sample_size} 筆歷史</div>
        </div>
      </div>
      ${stopText}
      <div class="quality-detail-list">${detailHtml}</div>
    </div>
  `;
}

function renderQualityDetail(d, direction) {
  const bucket = d.bucket;
  const indName = INDICATOR_DISPLAY[d.indicator] || d.indicator;

  if (d.low_n) {
    return `<div class="quality-detail">
      <span class="quality-detail-emoji" style="color:var(--muted)">○</span>
      <span class="quality-detail-name">${indName} ${bucket.label}</span>
      <span class="quality-detail-stats">n=${bucket.n}（樣本太少，未計分）</span>
    </div>`;
  }

  const c = d.contribution;
  let emoji, color;
  if (c >= 0.40) { emoji = "✅"; color = "var(--green)"; }
  else if (c >= 0.25) { emoji = "⚠️"; color = "var(--amber)"; }
  else { emoji = "❌"; color = "var(--red)"; }

  const fav  = direction === "多頭" ? "漲" : "跌";
  const sign = direction === "多頭" ? "+" : "";
  const hit  = Math.round(bucket.hit_10 * 100);

  return `<div class="quality-detail">
    <span class="quality-detail-emoji">${emoji}</span>
    <span class="quality-detail-name">${indName} ${bucket.label}</span>
    <span class="quality-detail-stats">
      n=${bucket.n} ·
      中位${fav} <strong style="color:${color}">${sign}${bucket.median}%</strong> ·
      MAE中位 <strong>${bucket.mae_med}%</strong> ·
      命中>10% <strong style="color:${color}">${hit}%</strong>
    </span>
  </div>`;
}

// ═════════════════════════════════════════════════════════════════════════
// 綜合判讀（舊版，保留）
// ═════════════════════════════════════════════════════════════════════════
function genVerdict(data) {
  const {adx, oi_chg, ls, fr_trend, taker_fut, taker_spot, vol_ratio, chg} = data;
  const signals = [], risks = [];
  if (adx !== null) {
    if (adx >= 25) signals.push('趨勢強勁（ADX ' + adx + '）');
    else if (adx < 15) risks.push('ADX 過低，盤整行情');
  }
  if (oi_chg !== null) {
    if (oi_chg > 15 && chg > 0) signals.push('OI 上升配合價格上漲');
    if (oi_chg > 15 && chg < 0) risks.push('OI 上升但價格下跌');
  }
  if (ls !== null && oi_chg !== null) {
    if (ls < 0.5 && oi_chg > 10) signals.push('多空比偏空 + OI 流入（逼空）');
    if (ls > 2.0 && oi_chg > 10) risks.push('散戶極端追多');
  }
  if (fr_trend === '📈 上升') risks.push('資費上升，做多擁擠');
  if (fr_trend === '📉 下降') signals.push('資費下降，空方增加');
  const ltf = lastValid(taker_fut), lts = lastValid(taker_spot);
  if (ltf !== null && ltf < 0.4) risks.push('合約 Taker 賣壓');
  if (lts !== null && lts > 0.6 && ltf !== null && ltf > 0.6) signals.push('現貨+合約雙向買盤');
  if (vol_ratio !== null && vol_ratio > 20) signals.push('極端放量');
  if (!signals.length && !risks.length) return '指標混合，無明顯方向訊號。';
  let text = '';
  if (signals.length) text += '✅ ' + signals.join(' ') + '。';
  if (risks.length)   text += (text?' ':'') + '⚠️ ' + risks.join(' ') + '。';
  return text;
}

// ═════════════════════════════════════════════════════════════════════════
// 主要查詢流程
// ═════════════════════════════════════════════════════════════════════════
async function analyze() {
  let raw = document.getElementById('symInput').value.trim().toUpperCase();
  if (!raw) return;
  raw = raw.replace(/USDT$|USDC$|BUSD$/, '');
  if (!raw) return;
  const sym = raw + 'USDT';

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true; btn.textContent = '查詢中...';
  const res = document.getElementById('result');
  res.innerHTML = '<div class="loading"><div class="spinner"></div><br>正在抓取 ' + raw + ' 數據...</div>';

  try {
    const BASE_F = 'https://fapi.binance.com';
    const BASE_S = 'https://api.binance.com';

    const [ticker, klines15m, klines1h, oiHist, lsData, frHist, takerFut, takerSpot] = await Promise.all([
      safeFetch(`${BASE_F}/fapi/v1/ticker/24hr?symbol=${sym}`, 'ticker'),
      safeFetch(`${BASE_F}/fapi/v1/klines?symbol=${sym}&interval=15m&limit=674`, 'klines15m'),
      safeFetch(`${BASE_F}/fapi/v1/klines?symbol=${sym}&interval=1h&limit=50`, 'klines1h'),
      safeFetch(`${BASE_F}/futures/data/openInterestHist?symbol=${sym}&period=15m&limit=4`, 'oiHist'),
      safeFetch(`${BASE_F}/futures/data/globalLongShortAccountRatio?symbol=${sym}&period=1h&limit=1`, 'lsData'),
      safeFetch(`${BASE_F}/fapi/v1/fundingRate?symbol=${sym}&limit=3`, 'frHist'),
      safeFetch(`${BASE_F}/futures/data/takerlongshortRatio?symbol=${sym}&period=5m&limit=4`, 'takerFut'),
      safeFetch(`${BASE_S}/api/v3/klines?symbol=${sym}&interval=5m&limit=4`, 'takerSpot'),
    ]);

    if (!ticker) throw new Error(`找不到 ${raw}/USDT 合約`);

    const price  = parseFloat(ticker.lastPrice);
    const chg    = parseFloat(ticker.priceChangePercent);
    const vol24h = parseFloat(ticker.quoteVolume);

    // 計算各指標
    let volRatio = null;
    if (klines15m && klines15m.length >= 3) {
      const k15 = klines15m.slice(0,-1);
      if (k15.length >= 2) {
        const curVol  = parseFloat(k15[k15.length-1][7]);
        const histVols= k15.slice(0,-1).map(k=>parseFloat(k[7]));
        const avgVol  = histVols.length ? histVols.reduce((a,b)=>a+b,0)/histVols.length : 0;
        volRatio = avgVol > 0 ? curVol/avgVol : null;
      }
    }

    let adx = null;
    if (klines1h && klines1h.length >= 30) adx = calcADX(klines1h.slice(0,-1));

    let oiChg = null;
    if (oiHist && oiHist.length >= 2) {
      const o1 = parseFloat(oiHist[oiHist.length-1].sumOpenInterest);
      const o0 = parseFloat(oiHist[oiHist.length-2].sumOpenInterest);
      oiChg = o0 > 0 ? (o1-o0)/o0*100 : null;
    }

    const ls = lsData && lsData[0] ? parseFloat(lsData[0].longShortRatio) : null;

    let frRates = [], frTrend = null, frNow = null;
    if (frHist && frHist.length > 0) {
      frRates = frHist.map(f=>parseFloat(f.fundingRate)*100);
      frNow = frRates[frRates.length-1];
      if (frRates.length >= 2) {
        const d = frRates[frRates.length-1] - frRates[0];
        if (d > 0.002)      frTrend = '📈 上升';
        else if (d < -0.002) frTrend = '📉 下降';
        else                 frTrend = '➡️ 持平';
      }
    }

    let tkFut = null;
    if (takerFut && Array.isArray(takerFut) && takerFut.length >= 1) {
      tkFut = takerFut.slice(-3).map(d => {
        const buy  = parseFloat(d.buyVol)  || 0;
        const sell = parseFloat(d.sellVol) || 0;
        const total = buy + sell;
        return total > 0 ? buy/total : null;
      });
    }
    let tkSpot = null;
    if (takerSpot && Array.isArray(takerSpot) && takerSpot.length > 1) {
      tkSpot = takerSpot.slice(0,-1).slice(-3).map(k=>{
        const tv=parseFloat(k[5])||0, tb=parseFloat(k[9])||0;
        return tv>0 ? tb/tv : null;
      });
    }
    const tkFutLast  = lastValid(tkFut);
    const tkSpotLast = lastValid(tkSpot);

    // v2.2.0：方向分類 + 訊號品質
    const dirResult = classifyDirection({
      oiChg, ls, fr: frNow, tkFutLast, tkSpotLast, priceChg: chg
    });
    const metrics = { volRatio, oiChg, ls, frNow, tkFutLast, tkSpotLast };
    const quality = computeSignalQuality(metrics, dirResult.direction);

    // 失敗的 fetch
    const failed = [];
    if (!klines15m) failed.push('15m K線');
    if (!klines1h)  failed.push('1h K線');
    if (!oiHist)    failed.push('OI 歷史');
    if (!lsData)    failed.push('多空比');
    if (!frHist)    failed.push('資費歷史');
    if (!takerFut)  failed.push('合約Taker');
    if (!takerSpot) failed.push('現貨Taker');

    // 舊版 verdict
    const verdict = genVerdict({adx, oi_chg: oiChg, ls, fr_trend: frTrend, taker_fut: tkFut, taker_spot: tkSpot, vol_ratio: volRatio, chg});

    // 異動類型標籤
    let sigType = '';
    if (volRatio !== null && oiChg !== null) {
      if (volRatio >= 20 && Math.abs(oiChg) >= 15) sigType = '⚡ 現貨+合約同時異動';
      else if (volRatio >= 20)                      sigType = '⚡ 現貨異動';
      else if (volRatio >= 5 && Math.abs(oiChg) >= 15) sigType = '⚡ 合約異動';
    }

    // Taker 格式
    const fmtTk = (arr) => {
      if (!arr || !arr.length) return null;
      return arr.map(r => {
        if (r === null || r === undefined || isNaN(r)) return '<span class="neutral">—</span>';
        const pct = Math.round(r*100);
        const cls = r>0.6?'pos':r<0.4?'neg':'neutral';
        return `<span class="${cls}">${pct}%</span>`;
      }).join(' → ');
    };

    const now = new Date().toLocaleTimeString('zh-TW');

    // 渲染
    res.innerHTML = `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="coin-name">${raw}/USDT</div>
            ${sigType ? `<div style="font-size:12px;color:var(--accent);margin-top:4px;">${sigType}</div>` : ''}
          </div>
          <div class="price-area">
            <div class="price">$${fmtPrice(price)}</div>
            <div class="chg ${chg>=0?'pos':'neg'}">${chg>=0?'+':''}${fmt(chg,2)}%</div>
          </div>
        </div>

        ${failed.length > 0 ? `<div class="warn-banner">⚠️ 部分資料抓取失敗：${failed.join('、')}（顯示為 N/A）</div>` : ''}

        <div class="grid2">
          <div class="metric">
            <div class="metric-label">成交量倍率（15m）</div>
            <div class="metric-val ${volRatio!==null&&volRatio>=20?'pos':volRatio!==null&&volRatio>=5?'amber':''}">${volRatio===null?'N/A':fmt(volRatio,1)+'x'}</div>
            <div class="metric-sub">24H: $${(vol24h/1e6).toFixed(1)}M</div>
          </div>
          <div class="metric">
            <div class="metric-label">OI 變化（15m）</div>
            <div class="metric-val ${oiChg!==null&&oiChg>15?'pos':oiChg!==null&&oiChg<-15?'neg':''}">${oiChg===null?'N/A':(oiChg>=0?'+':'')+fmt(oiChg,2)+'%'}</div>
          </div>
          <div class="metric">
            <div class="metric-label">ADX 趨勢強度</div>
            <div class="metric-val ${adx===null?'neutral':adx>=25?'pos':adx<15?'neg neutral':'amber'}">${adx===null?'N/A':adx}</div>
            <div class="metric-sub">${adx===null?'資料不足':adx>=25?'💪 強趨勢':adx>=15?'📊 弱趨勢':'⚪ 盤整'}</div>
          </div>
          <div class="metric">
            <div class="metric-label">多空比</div>
            <div class="metric-val ${ls&&ls>2?'neg':ls&&ls<0.5?'pos':''}">${ls===null?'N/A':fmt(ls,2)}</div>
            <div class="metric-sub">${ls===null?'—':(ls>2.0?'⚠️ 散戶極端偏多':ls<0.5?'🔥 偏空（逼空）':'均衡')}</div>
          </div>
        </div>

        <div class="section-title">資金費率（近3期結算）</div>
        ${frRates.length > 0 ? `
        <div class="fr-timeline">
          ${frRates.map(r=>`<div class="fr-pill ${r>0.01?'pos':r<-0.005?'neg':''}" style="${r>0.01?'border-color:rgba(45,206,137,0.3)':r<-0.005?'border-color:rgba(244,67,54,0.3)':''}">${r>=0?'+':''}${r.toFixed(4)}%</div>`).join('<span class="fr-arrow">→</span>')}
          ${frTrend ? `<span style="font-size:12px;color:var(--muted);margin-left:4px;">${frTrend}</span>` : ''}
        </div>` : '<div style="color:var(--muted);font-size:12px;">N/A</div>'}

        <div class="section-title">Taker 比率（近3筆 5m）</div>
        <div style="margin-bottom:0.5rem">
          <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">合約</div>
          ${tkFut && tkFut.length > 0 ? `<div style="font-size:13px;">${fmtTk(tkFut)}</div>
          ${tkFutLast !== null ? `<div class="taker-bar"><div class="taker-fill" style="width:${Math.round(tkFutLast*100)}%;background:${tkFutLast>0.5?'var(--green)':'var(--red)'};"></div></div>` : ''}` : '<div style="color:var(--muted);font-size:12px;">N/A</div>'}
        </div>
        <div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">現貨</div>
          ${tkSpot && tkSpot.length > 0 ? `<div style="font-size:13px;">${fmtTk(tkSpot)}</div>
          ${tkSpotLast !== null ? `<div class="taker-bar"><div class="taker-fill" style="width:${Math.round(tkSpotLast*100)}%;background:${tkSpotLast>0.5?'var(--green)':'var(--red)'};"></div></div>` : ''}` : '<div style="color:var(--muted);font-size:12px;">N/A</div>'}
        </div>

        ${HISTORICAL_STATS ? `
        <div class="section-title">
          <span>訊號品質評分</span>
          <span class="section-title-note">基於回測 ${HISTORICAL_STATS.n_bull}多/${HISTORICAL_STATS.n_bear}空</span>
        </div>
        ${renderQualityScore(quality, dirResult.direction)}
        ` : ''}

        <div class="verdict">
          <div class="verdict-label">綜合判讀</div>
          <div class="verdict-text">${verdict}</div>
        </div>

        <div style="text-align:right;margin-top:0.75rem;font-size:11px;color:var(--muted);">
          更新時間 <span class="timestamp">${now}</span>
        </div>
      </div>
    `;
  } catch(e) {
    console.error('[analyze]', e);
    const isCors = e.message.includes('Failed to fetch') || e.message.includes('NetworkError');
    const hint = isCors
      ? '可能是 CORS 限制。請用 Chrome 開啟或部署到 GitHub Pages。'
      : '請確認幣種名稱正確且幣安有此 USDT 永續合約';
    res.innerHTML = `<div class="error">查詢失敗：${e.message}<br><br><span style="font-size:12px;opacity:0.6;">${hint}</span></div>`;
  } finally {
    btn.disabled = false; btn.textContent = '分析';
  }
}

async function testConn() {
  const res = document.getElementById('result');
  res.innerHTML = '<div class="loading"><div class="spinner"></div><br>測試連線中...</div>';
  try {
    const r = await fetch('https://fapi.binance.com/fapi/v1/ping');
    if (r.ok) {
      const statsStatus = HISTORICAL_STATS
        ? `<br><br><span style="color:var(--green)">✅ 歷史回測資料已載入（${HISTORICAL_STATS.n_total} 筆，${HISTORICAL_STATS.version}）</span>`
        : `<br><br><span style="color:var(--amber)">⚠️ historical_stats.json 未載入，訊號評分功能停用</span>`;
      res.innerHTML = `<div style="padding:2rem;text-align:center;color:var(--green);">✅ Binance API 連線正常${statsStatus}</div>`;
    } else {
      res.innerHTML = '<div class="error">連線失敗（HTTP ' + r.status + '）</div>';
    }
  } catch(e) {
    res.innerHTML = '<div class="error">❌ 無法連線到 Binance API<br><br>' + e.message + '</div>';
  }
}
