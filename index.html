<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>山寨幣即時分析</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.08);
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --accent: #7c6af0;
    --green: #2dce89;
    --red: #f44336;
    --amber: #ffb74d;
    --blue: #42a5f5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', monospace;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container { max-width: 720px; margin: 0 auto; }

  header { margin-bottom: 2rem; }
  h1 {
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }
  .tagline {
    font-size: 22px;
    color: var(--text);
    letter-spacing: -0.02em;
    font-family: system-ui, sans-serif;
    font-weight: 300;
  }
  .tagline span { color: var(--accent); font-weight: 500; }

  .search-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }
  input[type="text"] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    text-transform: uppercase;
  }
  input[type="text"]::placeholder { color: var(--muted); text-transform: none; }
  input[type="text"]:focus { border-color: var(--accent); }
  button {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 0.75rem 1.5rem;
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .quick-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 2rem;
  }
  .quick-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.3rem 0.7rem;
    color: var(--muted);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .quick-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--surface2); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }
  .coin-name {
    font-size: 20px;
    font-family: system-ui, sans-serif;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .price-area { text-align: right; }
  .price { font-size: 18px; font-weight: 500; }
  .chg { font-size: 13px; margin-top: 2px; }
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .neutral { color: var(--muted); }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
  .metric {
    background: var(--surface2);
    border-radius: 8px;
    padding: 0.75rem;
  }
  .metric-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.35rem;
  }
  .metric-val { font-size: 15px; font-weight: 500; }
  .metric-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .section-title {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin: 1rem 0 0.5rem;
  }

  .signal-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .signal-row:last-child { border-bottom: none; }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-green { background: var(--green); }
  .dot-red { background: var(--red); }
  .dot-amber { background: var(--amber); }
  .dot-muted { background: var(--muted); }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.05em;
  }
  .badge-bull { background: rgba(45,206,137,0.15); color: var(--green); }
  .badge-bear { background: rgba(244,67,54,0.15); color: var(--red); }
  .badge-warn { background: rgba(255,183,77,0.15); color: var(--amber); }
  .badge-neutral { background: rgba(107,107,138,0.2); color: var(--muted); }

  .taker-bar {
    height: 6px;
    border-radius: 3px;
    background: var(--surface2);
    margin-top: 0.4rem;
    overflow: hidden;
    position: relative;
  }
  .taker-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  .fr-timeline {
    display: flex;
    gap: 0.4rem;
    align-items: center;
    margin-top: 0.4rem;
  }
  .fr-pill {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .fr-arrow { color: var(--muted); font-size: 12px; }

  .verdict {
    background: var(--surface2);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin-top: 0.5rem;
    border-left: 3px solid var(--accent);
  }
  .verdict-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .verdict-text { font-size: 14px; line-height: 1.6; font-family: system-ui, sans-serif; }

  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.05em;
  }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 0.75rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    text-align: center;
    padding: 2rem;
    color: var(--red);
    font-size: 13px;
  }

  footer {
    margin-top: 2rem;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .timestamp { color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Altcoin Monitor</h1>
    <div class="tagline">即時分析 <span>任意幣安合約</span></div>
  </header>

  <div class="search-row">
    <input type="text" id="symInput" placeholder="輸入幣種，例如 PEPE" />
    <button id="analyzeBtn" onclick="analyze()">分析</button>
  </div>

  <div class="quick-btns" id="quickBtns"></div>

  <div id="result"></div>

  <footer>
    資料來源：Binance Futures API &nbsp;·&nbsp; 每次查詢即時抓取
    &nbsp;·&nbsp; <a href="#" onclick="testConn();return false;" style="color:var(--accent);text-decoration:none;">連線測試</a>
  </footer>
</div>

<script>
const QUICK = ['PEPE','WIF','BONK','DOGS','NOT','HMSTR','MEME','1000CAT','SHIB','FLOKI','TON'];
const qb = document.getElementById('quickBtns');
QUICK.forEach(s => {
  const b = document.createElement('button');
  b.className = 'quick-btn';
  b.textContent = s;
  b.onclick = () => { document.getElementById('symInput').value = s; analyze(); };
  qb.appendChild(b);
});

document.getElementById('symInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') analyze();
});

function fmt(n, dec=2) {
  if (n === null || n === undefined || isNaN(n)) return 'N/A';
  return Number(n).toFixed(dec);
}
function fmtPrice(p) {
  if (!p) return 'N/A';
  return p < 0.0001 ? p.toFixed(8) : p < 0.01 ? p.toFixed(6) : p < 1 ? p.toFixed(4) : p.toFixed(2);
}

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

function calcADX(klines, period=14) {
  if (klines.length < period*2) return 0;
  const highs = klines.map(k=>parseFloat(k[2]));
  const lows  = klines.map(k=>parseFloat(k[3]));
  const closes= klines.map(k=>parseFloat(k[4]));
  const tr=[], pdm=[], ndm=[];
  for(let i=1;i<closes.length;i++){
    tr.push(Math.max(highs[i]-lows[i], Math.abs(highs[i]-closes[i-1]), Math.abs(lows[i]-closes[i-1])));
    const up=highs[i]-highs[i-1], dn=lows[i-1]-lows[i];
    pdm.push(up>dn&&up>0?up:0);
    ndm.push(dn>up&&dn>0?dn:0);
  }
  function ws(arr,n){ let s=[arr.slice(0,n).reduce((a,b)=>a+b,0)]; for(let i=n;i<arr.length;i++) s.push(s[s.length-1]-s[s.length-1]/n+arr[i]); return s; }
  const atr=ws(tr,period), ps=ws(pdm,period), ns=ws(ndm,period);
  const dx=[];
  for(let i=0;i<atr.length;i++){
    if(!atr[i]) continue;
    const pdi=100*ps[i]/atr[i], ndi=100*ns[i]/atr[i];
    dx.push(100*Math.abs(pdi-ndi)/((pdi+ndi)||1));
  }
  if(dx.length<period) return 0;
  let adx=dx.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for(let i=period;i<dx.length;i++) adx=(adx*(period-1)+dx[i])/period;
  return Math.round(adx*10)/10;
}

function genVerdict(data) {
  const {adx, oi_chg, ls, fr_trend, taker_fut, taker_spot, vol_ratio, chg} = data;
  const signals = [];
  const risks   = [];

  if (adx >= 25) signals.push('趨勢強勁（ADX ' + adx + '）');
  else if (adx < 15) risks.push('ADX 過低，盤整行情');

  if (oi_chg > 15 && chg > 0) signals.push('OI 上升配合價格上漲');
  if (oi_chg > 15 && chg < 0) risks.push('OI 上升但價格下跌（空頭主導）');

  if (ls && ls < 0.5 && oi_chg > 10) signals.push('多空比偏空 + OI 流入（逼空）');
  if (ls && ls > 2.0 && oi_chg > 10) risks.push('散戶極端追多，留意反轉');

  if (fr_trend === '📈 上升') risks.push('資金費率快速上升，做多擁擠');
  if (fr_trend === '📉 下降') signals.push('資金費率下降，空方增加');

  if (taker_fut && taker_fut[taker_fut.length-1] < 0.4) risks.push('合約 Taker 賣壓增加');
  if (taker_spot && taker_spot[taker_spot.length-1] > 0.6 && taker_fut && taker_fut[taker_fut.length-1] > 0.6) signals.push('現貨+合約雙向買盤');

  if (vol_ratio > 20) signals.push('極端放量（' + vol_ratio.toFixed(1) + 'x）');

  if (!signals.length && !risks.length) return '指標混合，無明顯方向訊號。';
  let text = '';
  if (signals.length) text += '✅ ' + signals.join('　') + '。';
  if (risks.length) text += (text?' ':'') + '⚠️ ' + risks.join('　') + '。';
  return text;
}

async function analyze() {
  let raw = document.getElementById('symInput').value.trim().toUpperCase();
  if (!raw) return;
  // 去掉已有的後綴，避免 INXUSDT → INXUSDTUSDT
  raw = raw.replace(/USDT$|USDC$|BUSD$/, '');
  if (!raw) return;
  // 自動處理：避免重複加 USDT
  const sym = raw.endsWith('USDT') || raw.endsWith('USDC') ? raw : raw + 'USDT';
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = '查詢中...';
  const res = document.getElementById('result');
  res.innerHTML = '<div class="loading"><div class="spinner"></div><br>正在抓取 ' + raw + ' 數據...</div>';

  try {
    const BASE_F = 'https://fapi.binance.com';
    const BASE_S = 'https://api.binance.com';

    const [ticker, klines15m, klines1h, oiHist, lsData, frHist, takerFut, takerSpot] = await Promise.all([
      fetchJSON(`${BASE_F}/fapi/v1/ticker/24hr?symbol=${sym}`),
      fetchJSON(`${BASE_F}/fapi/v1/klines?symbol=${sym}&interval=15m&limit=674`),
      fetchJSON(`${BASE_F}/fapi/v1/klines?symbol=${sym}&interval=1h&limit=50`),
      fetchJSON(`${BASE_F}/futures/data/openInterestHist?symbol=${sym}&period=15m&limit=4`),
      fetchJSON(`${BASE_F}/futures/data/globalLongShortAccountRatio?symbol=${sym}&period=1h&limit=1`).catch(()=>null),
      fetchJSON(`${BASE_F}/fapi/v1/fundingRate?symbol=${sym}&limit=3`),
      fetchJSON(`${BASE_F}/futures/data/takerBuySellVol?symbol=${sym}&period=5m&limit=3`).catch(()=>null),
      fetchJSON(`${BASE_S}/api/v3/klines?symbol=${sym}&interval=5m&limit=4`).catch(()=>null),
    ]);

    const price   = parseFloat(ticker.lastPrice);
    const chg     = parseFloat(ticker.priceChangePercent);
    const vol24h  = parseFloat(ticker.quoteVolume);

    // Volume ratio (15m)
    const k15 = klines15m.slice(0,-1);
    const curVol = parseFloat(k15[k15.length-1][7]);
    const histVols = k15.slice(0,-1).map(k=>parseFloat(k[7]));
    const avgVol = histVols.reduce((a,b)=>a+b,0)/histVols.length;
    const volRatio = avgVol > 0 ? curVol/avgVol : 0;

    // ADX (1h)
    const adx = calcADX(klines1h.slice(0,-1));

    // OI change
    let oiChg = 0;
    if (oiHist.length >= 2) {
      const oi1 = parseFloat(oiHist[oiHist.length-1].sumOpenInterest);
      const oi0 = parseFloat(oiHist[oiHist.length-2].sumOpenInterest);
      oiChg = oi0 > 0 ? (oi1-oi0)/oi0*100 : 0;
    }

    // Long/short ratio
    const ls = lsData && lsData[0] ? parseFloat(lsData[0].longShortRatio) : null;

    // Funding rate history
    const frRates = frHist.map(f=>parseFloat(f.fundingRate)*100);
    let frTrend = '➡️ 持平';
    if (frRates.length >= 2) {
      const d = frRates[frRates.length-1] - frRates[0];
      if (d > 0.002) frTrend = '📈 上升';
      else if (d < -0.002) frTrend = '📉 下降';
    }
    const frNow = frRates[frRates.length-1] || 0;

    // Taker futures（檢查是否為有效 list）
    let tkFut = null;
    if (takerFut && Array.isArray(takerFut) && takerFut.length > 0) {
      tkFut = takerFut.map(d=>{
        const b=parseFloat(d.buyVol)||0, s=parseFloat(d.sellVol)||0;
        return b+s>0 ? b/(b+s) : 0.5;
      });
    }

    // Taker spot（檢查是否為有效 list）
    let tkSpot = null;
    if (takerSpot && Array.isArray(takerSpot) && takerSpot.length > 1) {
      tkSpot = takerSpot.slice(0,-1).slice(-3).map(k=>{
        const tv=parseFloat(k[5])||0, tb=parseFloat(k[9])||0;
        return tv>0 ? tb/tv : 0.5;
      });
    }

    // Verdict
    const verdict = genVerdict({adx, oi_chg: oiChg, ls, fr_trend: frTrend, taker_fut: tkFut, taker_spot: tkSpot, vol_ratio: volRatio, chg});

    // Determine signal type
    let sigType = '';
    if (volRatio >= 20 && Math.abs(oiChg) >= 15) sigType = '⚡ 現貨+合約同時異動';
    else if (volRatio >= 20) sigType = '⚡ 現貨異動';
    else if (volRatio >= 5 && Math.abs(oiChg) >= 15) sigType = '⚡ 合約異動';

    // Helpers
    const fmtTk = (arr) => {
      if (!arr || !arr.length) return null;
      return arr.map(r => {
        const pct = Math.round(r*100);
        const cls = r>0.6?'pos':r<0.4?'neg':'neutral';
        return `<span class="${cls}">${pct}%</span>`;
      }).join(' → ');
    };

    const now = new Date().toLocaleTimeString('zh-TW');

    res.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="coin-name">${raw}/USDT</div>
          ${sigType ? `<div style="font-size:12px;color:var(--accent);margin-top:4px;">${sigType}</div>` : ''}
        </div>
        <div class="price-area">
          <div class="price">$${fmtPrice(price)}</div>
          <div class="chg ${chg>=0?'pos':'neg'}">${chg>=0?'+':''}${fmt(chg,2)}%</div>
        </div>
      </div>

      <div class="grid2">
        <div class="metric">
          <div class="metric-label">成交量倍率（15m）</div>
          <div class="metric-val ${volRatio>=20?'pos':volRatio>=5?'amber':''}">${fmt(volRatio,1)}x</div>
          <div class="metric-sub">24H: $${(vol24h/1e6).toFixed(1)}M</div>
        </div>
        <div class="metric">
          <div class="metric-label">OI 變化（15m）</div>
          <div class="metric-val ${oiChg>15?'pos':oiChg<-15?'neg':''}">${oiChg>=0?'+':''}${fmt(oiChg,2)}%</div>
        </div>
        <div class="metric">
          <div class="metric-label">ADX 趨勢強度</div>
          <div class="metric-val ${adx>=25?'pos':adx<15?'neg neutral':'amber'}">${adx}</div>
          <div class="metric-sub">${adx>=25?'💪 強趨勢':adx>=15?'📊 弱趨勢':'⚪ 盤整'}</div>
        </div>
        <div class="metric">
          <div class="metric-label">多空比</div>
          <div class="metric-val ${ls&&ls>2?'neg':ls&&ls<0.5?'pos':''}">${ls?fmt(ls,2):'N/A'}</div>
          <div class="metric-sub">${ls?(ls>2.0?'⚠️ 散戶極端偏多':ls<0.5?'🔥 偏空（逼空）':'均衡'):'—'}</div>
        </div>
      </div>

      <div class="section-title">資金費率（近3期結算）</div>
      <div class="fr-timeline">
        ${frRates.map(r=>`<div class="fr-pill ${r>0.01?'pos':r<-0.005?'neg':''}" style="${r>0.01?'border-color:rgba(45,206,137,0.3)':r<-0.005?'border-color:rgba(244,67,54,0.3)':''}">${r>=0?'+':''}${r.toFixed(4)}%</div>`).join('<span class="fr-arrow">→</span>')}
        <span style="font-size:12px;color:var(--muted);margin-left:4px;">${frTrend}</span>
      </div>

      <div class="section-title">Taker 比率（近3筆 5m，買入%）</div>
      <div style="margin-bottom:0.5rem">
        <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">合約</div>
        ${tkFut && tkFut.length > 0 ? `<div style="font-size:13px;">${fmtTk(tkFut)}</div>
        <div class="taker-bar"><div class="taker-fill" style="width:${Math.round(tkFut[tkFut.length-1]*100)}%;background:${tkFut[tkFut.length-1]>0.5?'var(--green)':'var(--red)'};"></div></div>` : '<div style="color:var(--muted);font-size:12px;">N/A（此幣無 Taker 數據）</div>'}
      </div>
      <div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">現貨</div>
        ${tkSpot && tkSpot.length > 0 ? `<div style="font-size:13px;">${fmtTk(tkSpot)}</div>
        <div class="taker-bar"><div class="taker-fill" style="width:${Math.round(tkSpot[tkSpot.length-1]*100)}%;background:${tkSpot[tkSpot.length-1]>0.5?'var(--green)':'var(--red)'};"></div></div>` : '<div style="color:var(--muted);font-size:12px;">N/A（無現貨或數據不足）</div>'}
      </div>

      <div class="verdict">
        <div class="verdict-label">綜合判讀</div>
        <div class="verdict-text">${verdict}</div>
      </div>

      <div style="text-align:right;margin-top:0.75rem;font-size:11px;color:var(--muted);">
        更新時間 <span class="timestamp">${now}</span>
      </div>
    </div>
    `;
  } catch(e) {
    const isCors = e.message.includes('Failed to fetch') || e.message.includes('NetworkError');
    const hint = isCors
      ? '可能是瀏覽器 CORS 限制。請用 Chrome 開啟，或將檔案放到本地伺服器上。'
      : '請確認幣種名稱正確，且幣安有此 USDT 永續合約';
    res.innerHTML = `<div class="error">查詢失敗：${e.message}<br><br><span style="font-size:12px;opacity:0.6;">${hint}</span></div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '分析';
  }
}

async function testConn() {
  const res = document.getElementById('result');
  res.innerHTML = '<div class="loading"><div class="spinner"></div><br>測試連線中...</div>';
  try {
    const r = await fetch('https://fapi.binance.com/fapi/v1/ping');
    if (r.ok) {
      res.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--green);">✅ 連線正常！Binance API 可以存取<br><br><span style="color:var(--muted);font-size:12px;">如果查詢幣種還是失敗，可能是幣種名稱有誤</span></div>';
    } else {
      res.innerHTML = '<div class="error">連線失敗（HTTP ' + r.status + '）</div>';
    }
  } catch(e) {
    res.innerHTML = '<div class="error">❌ 無法連線到 Binance API<br><br>' + e.message + '<br><br><span style="font-size:12px;">請嘗試：① 開 VPN ② 換網路 ③ 用 GitHub Pages 託管此頁面</span></div>';
  }
}
</script>
</body>
</html>
